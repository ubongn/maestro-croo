<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro — Logo Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 32px;
  background: #f5f5f3;
  font-family: Inter, -apple-system, system-ui, sans-serif;
}
.logo-preview img {
  width: 240px; height: 240px;
  filter: drop-shadow(0 8px 32px rgba(15,15,15,.12));
}
.title-block { text-align: center; }
.title-block h1 {
  font-size: 48px; font-weight: 800; letter-spacing: -0.03em;
  background: linear-gradient(135deg, #16a34a, #2563eb);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 8px;
}
.title-block .desc {
  font-size: 18px; color: #6b7280; max-width: 500px; line-height: 1.5;
}
</style>
</head>
<body>
  <div class="logo-preview">
    <img src="/logo.svg" alt="Maestro" />
  </div>
  <div class="title-block">
    <h1>Maestro</h1>
    <p class="desc">Meta-agent on CROO Network that hires other agents to compose complete DeFi allocation strategies. Dual-role A2A orchestration with on-chain USDC payments on Base.</p>
  </div>
</body>
</html>
